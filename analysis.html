<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PULSE | Performance Analysis & Scientific Report</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Fixed Ambient Layout Elements -->
    <div id="canvas-container"></div>
    <div class="bg-grid" id="bg-grid"></div>
    <div class="glow-orb" id="glow-orb-1" style="opacity: 0.12;"></div>
    <div class="glow-orb" id="glow-orb-2" style="opacity: 0.12;"></div>

    <div class="content-wrapper">
      <!-- Performance Analysis Section -->
      <div id="performance-analysis" class="performance-analysis-overlay active" style="position: relative; height: auto; min-height: 100vh; overflow: visible; z-index: 10;">
        <!-- Subtle scanlines overlay -->
        <div class="scanlines"></div>
        
        <div class="analysis-header" style="border-bottom: 1px solid var(--border-color); padding: 1.5rem 2.5rem; display: flex; justify-content: space-between; align-items: center;">
          <div class="analysis-header-left">
            <span class="tech-tag highlight" style="color: var(--color-cyan); border-color: rgba(0, 242, 254, 0.3); background: rgba(0, 242, 254, 0.05); text-transform: uppercase;">COGNITIVE METADATA REPORT</span>
            <div class="analysis-report-id" id="analysis-report-id" style="font-family: var(--font-mono); font-size: 0.72rem; color: var(--color-text-secondary); margin-top: 0.25rem;">REPORT ID: PR-180611</div>
          </div>
          <div class="analysis-title-group" style="text-align: center;">
            <h1 class="analysis-title text-gradient-cyan-blue" style="font-family: var(--font-display); font-weight: 800; font-size: 1.8rem; letter-spacing: 0.1em; text-transform: uppercase; margin: 0;" id="analysis-title">Performance Analysis</h1>
            <p class="analysis-subtitle" style="font-family: var(--font-sans); color: var(--color-text-secondary); font-size: 0.9rem; margin-top: 0.25rem; margin-bottom: 0;">Understanding your cognitive performance.</p>
          </div>
          <div class="analysis-user-badge">
            <span class="user-badge-label" id="analysis-user-display" style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-color); padding: 0.4rem 0.8rem; border-radius: 6px; font-family: var(--font-mono); font-size: 0.72rem; color: var(--color-cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.2);">SUBJECT ID: --</span>
          </div>
        </div>
        
        <div class="analysis-body" style="padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%;">
          <div class="analysis-grid" style="display: grid; grid-template-columns: 1fr; gap: 2rem;">
            
            <!-- SECTION 1: Results Summary & Rating -->
            <div class="analysis-section glass-card" style="padding: 2.25rem; display: flex; flex-direction: column; gap: 1.5rem;">
              <div class="analysis-section-header" style="display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <span class="section-badge-id" style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--color-cyan); background: rgba(0, 242, 254, 0.08); border: 1px solid rgba(0, 242, 254, 0.2); padding: 0.2rem 0.5rem; border-radius: 4px;">01</span>
                <h2 class="analysis-section-title" style="font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin: 0;">Assessment Standings & Metrics</h2>
              </div>
              
              <div class="results-summary-grid" id="results-summary-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem;">
                <!-- Dynamically populated with relevant stats -->
              </div>

              <div class="rating-box-container" id="rating-box-container" style="margin-top: 1rem;">
                <!-- Dynamic Rating Display -->
              </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem;">
              <!-- SECTION 2: What Was Measured? -->
              <div class="analysis-section glass-card" style="padding: 2.25rem; display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="analysis-section-header" style="display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                  <span class="section-badge-id" style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--color-cyan); background: rgba(0, 242, 254, 0.08); border: 1px solid rgba(0, 242, 254, 0.2); padding: 0.2rem 0.5rem; border-radius: 4px;">02</span>
                  <h2 class="analysis-section-title" style="font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin: 0;">Cognitive Systems Isolated</h2>
                </div>
                <div class="measured-explanation-list" id="measured-explanation-list" style="display: flex; flex-direction: column; gap: 1.25rem;">
                  <!-- Dynamically populated scientific breakdown of pathways -->
                </div>
              </div>

              <!-- SECTION 3: Science-Backed Recommendations -->
              <div class="analysis-section glass-card" style="padding: 2.25rem; display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="analysis-section-header" style="display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                  <span class="section-badge-id" style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--color-cyan); background: rgba(0, 242, 254, 0.08); border: 1px solid rgba(0, 242, 254, 0.2); padding: 0.2rem 0.5rem; border-radius: 4px;">03</span>
                  <h2 class="analysis-section-title" style="font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin: 0;">Improvement Protocols</h2>
                </div>
                <div class="recommendations-list" id="recommendations-list" style="display: flex; flex-direction: column; gap: 1rem;">
                  <!-- Dynamically populated list of personalized improvement tips -->
                </div>
              </div>
            </div>

            <!-- SECTION 4: Neuro-Science Trivia / Facts -->
            <div class="analysis-section glass-card" style="padding: 2.25rem; display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 7rem;">
              <div class="analysis-section-header" style="display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                <span class="section-badge-id" style="font-family: var(--font-mono); font-size: 0.9rem; color: var(--color-cyan); background: rgba(0, 242, 254, 0.08); border: 1px solid rgba(0, 242, 254, 0.2); padding: 0.2rem 0.5rem; border-radius: 4px;">04</span>
                <h2 class="analysis-section-title" style="font-family: var(--font-display); font-size: 1.15rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin: 0;">Neuroscience Observations</h2>
              </div>
              <div class="fun-facts-container" id="fun-facts-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
                <!-- Dynamically populated trivia list -->
              </div>
            </div>

          </div>
        </div>

        <!-- Sticky Footer Navigation -->
        <div class="analysis-navigation-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; border-top: 1px solid var(--border-color); background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 1.25rem 2rem; z-index: 100;">
          <div class="nav-bar-container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%;">
            <button class="btn-workspace-back" id="btn-analysis-back-home" style="padding: 0.75rem 1.5rem; display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-display); text-transform: uppercase;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Return to Home
            </button>
            <div class="nav-bar-actions" style="display: flex; gap: 1rem;">
              <button class="btn-primary" id="btn-analysis-view-leaderboards" style="padding: 0.75rem 1.5rem; background: transparent; border: 1px solid var(--border-color); color: var(--color-text-primary); box-shadow: none; display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-display); text-transform: uppercase;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                View Standings
              </button>
              <button class="btn-primary" id="btn-analysis-retry" style="padding: 0.75rem 1.5rem; background: var(--color-cyan); color: #000000; box-shadow: var(--glow-cyan); display: inline-flex; align-items: center; gap: 0.5rem; font-family: var(--font-display); text-transform: uppercase;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                Retry Assessment
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/analysis.js"></script>
  </body>
</html>
